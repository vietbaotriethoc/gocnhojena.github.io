<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Góc Nhỏ Jena</title>

<style>

body{
margin:0;
height:100vh;

font-family: Arial, sans-serif;

background:url("background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;
}

/* khung kính */

.glass{

width:700px;
max-width:90%;

padding:50px;

background:rgba(255,255,255,0.15);

border-radius:20px;

backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.3);

box-shadow:0 8px 32px rgba(0,0,0,0.35);

color:white;

text-align:center;

}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
font-size:18px;
opacity:0.9;
}

</style>

<script>

// chặn chuột phải
document.addEventListener("contextmenu", function(e){
e.preventDefault();
});

// chặn copy
document.addEventListener("copy", function(e){
e.preventDefault();
});

// chặn phím tắt
document.onkeydown = function(e){

if(e.ctrlKey && e.key === "c"){return false;}
if(e.ctrlKey && e.key === "u"){return false;}
if(e.ctrlKey && e.key === "s"){return false;}
if(e.ctrlKey && e.key === "a"){return false;}

};

</script>

</head>

<body>

<div class="glass">

<h1>Góc nhỏ Jena</h1>

<p>
Ghi chép, tiểu luận và suy tư về triết học.
</p>

</div>

</body>
</html>
