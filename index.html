<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Góc Nhỏ Jena</title>

<style>
body{
font-family: Arial;
max-width:800px;
margin:auto;
padding:40px;
line-height:1.8;
user-select:none;
}

h1{
color:#222;
}

p{
font-size:18px;
}
</style>

<script>

// chặn chuột phải
document.addEventListener("contextmenu", function(e){
e.preventDefault();
});

// chặn copy
document.addEventListener("copy", function(e){
e.preventDefault();
});

// chặn phím tắt
document.onkeydown = function(e){

// Ctrl+C
if(e.ctrlKey && e.key === "c"){
return false;
}

// Ctrl+U
if(e.ctrlKey && e.key === "u"){
return false;
}

// Ctrl+S
if(e.ctrlKey && e.key === "s"){
return false;
}

// Ctrl+A
if(e.ctrlKey && e.key === "a"){
return false;
}

};

</script>

</head>

<body>

<h1>Góc Nhỏ Jena</h1>

<p>
Chào mừng đến với Góc Nhỏ Jena.
</p>

</body>
</html>
